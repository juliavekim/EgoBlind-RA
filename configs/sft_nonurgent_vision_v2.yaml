### Non-urgent SFT with vision (1 frame per example)
### Based on Julia's working config

# Model
model_name_or_path: moonshotai/Kimi-VL-A3B-Instruct
trust_remote_code: true

# Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,v_proj

# Dataset — vision-conditioned
dataset: egoblind_nonurgent_vision_sft
dataset_dir: data/
template: kimi_vl_nothink
cutoff_len: 2048
overwrite_cache: true

# Output
output_dir: output/sft_nonurgent_vision_v2
logging_steps: 10
save_steps: 100
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

# Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: false
