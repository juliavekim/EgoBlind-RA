### DPO config for urgent vision model
### Builds on SFT urgent vision adapter

# Model — start from SFT checkpoint
model_name_or_path: moonshotai/Kimi-VL-A3B-Instruct
adapter_name_or_path: output/sft_urgent_vision
trust_remote_code: true

# Method
stage: dpo
do_train: true
finetuning_type: lora
pref_beta: 0.1
pref_loss: sigmoid

# Template — must match SFT
template: kimi_vl_nothink

# LoRA config — must match SFT exactly
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: q_proj,v_proj

# Dataset
dataset: egoblind_urgent_dpo_vision
dataset_dir: data/
cutoff_len: 2048
overwrite_cache: true

# Output
output_dir: output/dpo_urgent_vision
logging_steps: 5
save_steps: 50
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true

# Training — lower LR than SFT for stability
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: false
